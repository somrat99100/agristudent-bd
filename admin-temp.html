<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — AgriStudent BD</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<section class="section-page">
  <div class="container" style="max-width:800px;">
    <h1>🔐 Admin — Resource Review</h1>
    <p style="color:var(--terracotta-500);font-size:.85rem;margin-bottom:2rem;">
      Temporary admin page — password-only, not real authentication. Replace with Firebase Auth in Phase 8. Don't link to this page publicly.
    </p>

    <div id="admin-gate" style="max-width:320px;">
      <label for="admin-password" style="display:block;font-weight:600;margin-bottom:.4rem;">Admin Password</label>
      <input type="password" id="admin-password" style="width:100%;padding:.7rem .9rem;border:1px solid var(--line);border-radius:8px;margin-bottom:.8rem;">
      <button id="admin-unlock" class="btn-primary" style="width:100%;">Unlock</button>
      <p id="admin-pw-error" class="hidden" style="color:var(--terracotta-500);font-size:.85rem;margin-top:.6rem;">Incorrect password.</p>
    </div>

    <div id="admin-panel" class="hidden">
      <h2 style="font-size:1.1rem;margin-bottom:1rem;">Resources — Pending / Approved / Rejected</h2>
      <div id="admin-resource-list"></div>
    </div>
  </div>
</section>

<script type="module" src="js/admin-temp.js"></script>
</body>
</html>
