<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — AgriStudent BD</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<section class="section-page">
  <div class="container" style="max-width:800px;">
    <h1>🔐 Admin — Resource Review</h1>
    <p style="color:var(--terracotta-500);font-size:.85rem;margin-bottom:2rem;">
      Temporary admin page — password-only, not real authentication. Replace with Firebase Auth in Phase 8. Don't link to this page publicly.
    </p>

    <div id="admin-gate" style="max-width:320px;">
      <label for="admin-password" style="display:block;font-weight:600;margin-bottom:.4rem;">Admin Password</label>
      <input type="password" id="admin-password" style="width:100%;padding:.7rem .9rem;border:1px solid var(--line);border-radius:8px;margin-bottom:.8rem;">
      <button id="admin-unlock" class="btn-primary" style="width:100%;">Unlock</button>
      <p id="admin-pw-error" class="hidden" style="color:var(--terracotta-500);font-size:.85rem;margin-top:.6rem;">Incorrect password.</p>
    </div>

    <div id="admin-panel" class="hidden">
      <div style="display:flex;gap:.6rem;margin-bottom:1.4rem;flex-wrap:wrap;">
        <button id="tab-resources" class="course-btn" style="background:var(--moss-700);color:#fff;">📚 Resources</button>
        <button id="tab-terms" class="course-btn">📖 Terms</button>
        <button id="tab-timeline" class="course-btn">📅 Timeline</button>
      </div>

      <div id="resources-panel">
        <h2 style="font-size:1.1rem;margin-bottom:1rem;">Resources — Pending / Approved / Rejected</h2>
        <div id="admin-resource-list"></div>
      </div>

      <div id="terms-panel" class="hidden">
        <h2 style="font-size:1.1rem;margin-bottom:1rem;">Terms — Pending / Approved / Rejected</h2>
        <div id="admin-term-list"></div>
      </div>

      <div id="timeline-panel" class="hidden">
        <h2 style="font-size:1.1rem;margin-bottom:1rem;">Academic Timeline Events</h2>

        <form id="add-event-form" style="display:flex;gap:.6rem;flex-wrap:wrap;align-items:flex-end;margin-bottom:1.6rem;border:1px solid var(--line);padding:1rem;border-radius:8px;background:#fff;">
          <div>
            <label style="display:block;font-size:.78rem;font-weight:600;margin-bottom:.2rem;">Title</label>
            <input type="text" id="event-title" required placeholder="e.g., Final Examination" style="padding:.5rem .7rem;border:1px solid var(--line);border-radius:6px;">
          </div>
          <div>
            <label style="display:block;font-size:.78rem;font-weight:600;margin-bottom:.2rem;">Start Date</label>
            <input type="date" id="event-date" required style="padding:.5rem .7rem;border:1px solid var(--line);border-radius:6px;">
          </div>
          <div>
            <label style="display:block;font-size:.78rem;font-weight:600;margin-bottom:.2rem;">End Date (optional — for date ranges like exam weeks)</label>
            <input type="date" id="event-end-date" style="padding:.5rem .7rem;border:1px solid var(--line);border-radius:6px;">
          </div>
          <div>
            <label style="display:block;font-size:.78rem;font-weight:600;margin-bottom:.2rem;">Type</label>
            <select id="event-type" style="padding:.5rem .7rem;border:1px solid var(--line);border-radius:6px;">
              <option value="registration">Registration</option>
              <option value="advising">Advising</option>
              <option value="add_drop">Add/Drop Deadline</option>
              <option value="class_test">Class Test (ring card)</option>
              <option value="midterm">Midterm Examination (ring card)</option>
              <option value="final">Final Examination (ring card)</option>
              <option value="break">Semester Break</option>
              <option value="semester_end">Semester Ends</option>
            </select>
          </div>
          <button type="submit" class="btn-primary">+ Add Event</button>
        </form>

        <div id="admin-timeline-list"></div>
      </div>
    </div>
  </div>
</section>

<script type="module" src="js/admin-temp.js"></script>
</body>
</html>
