<!-- ======================================================
     SECURITY META TAGS — paste into <head> of every page
     ====================================================== -->

<!-- X-Content-Type-Options: prevents MIME sniffing (fixes −5) -->
<meta http-equiv="X-Content-Type-Options" content="nosniff">

<!-- X-Frame-Options: prevents clickjacking (fixes −20) -->
<meta http-equiv="X-Frame-Options" content="SAMEORIGIN">

<!-- Referrer Policy: limits referrer info sent to other sites -->
<meta name="referrer" content="strict-origin-when-cross-origin">

<!-- Content Security Policy (fixes −25) -->
<!-- Allows: your own files, Google Fonts, Firebase, Cloudinary, CDN scripts -->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self'
    'unsafe-inline'
    https://www.gstatic.com
    https://cdnjs.cloudflare.com
    https://www.googletagmanager.com;
  style-src 'self'
    'unsafe-inline'
    https://fonts.googleapis.com;
  font-src 'self'
    https://fonts.gstatic.com;
  img-src 'self'
    data:
    https://res.cloudinary.com
    https://lh3.googleusercontent.com;
  connect-src 'self'
    https://*.googleapis.com
    https://*.firebaseio.com
    https://firestore.googleapis.com
    https://identitytoolkit.googleapis.com
    https://api.cloudinary.com;
  frame-src 'none';
  object-src 'none';
  base-uri 'self';
">
