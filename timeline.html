<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdnjs.cloudflare.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://res.cloudinary.com https://lh3.googleusercontent.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://api.cloudinary.com; frame-src 'none'; object-src 'none'; base-uri 'self';">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="manifest" href="manifest.json">
<title>Academic Timeline — AgriStudent BD</title>
<script src="js/auth-guard.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500;700&family=Playfair+Display:ital,wght@0,600;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/timeline.css">
</head>
<body>

<div id="navbar-placeholder"></div>
<script src="js/navbar-loader.js"></script>

<main class="timeline-container">
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <header class="timeline-header animate-fade-down">
        <h1 class="timeline-main-title">Academic Timeline</h1>
        <p class="semester-subtitle" id="semester-label">Loading semester…</p>

        <div class="planner-wrapper">
            <a href="https://somrat99100.github.io/planner/" target="_blank" class="planner-btn">
                <span>Make and follow planner</span>
                <svg class="arrow-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            </a>
        </div>
    </header>

    <section class="calendar-banner card-panel animate-fade-up" style="animation-delay: 0.1s;">
        <div class="calendar-inner-content">
            <h2 class="calendar-widget-title">Academic Calendar</h2>
            <div class="calendar-month-header" id="calendar-month-year">—</div>

            <div class="calendar-weekdays">
                <div class="weekday-lbl">Su</div><div class="weekday-lbl">Mo</div><div class="weekday-lbl">Tu</div><div class="weekday-lbl">We</div><div class="weekday-lbl">Th</div><div class="weekday-lbl">Fr</div><div class="weekday-lbl">Sa</div>
            </div>

            <div id="calendar-days-container" class="calendar-days-grid"></div>

            <div class="calendar-legend">
                <div class="legend-item"><span class="legend-dot dot-today"></span> Today</div>
                <div class="legend-item"><span class="legend-dot dot-path"></span> Distance Track</div>
            </div>
        </div>
    </section>

    <section class="exam-trackers-stack" id="exam-trackers-stack">
        <p style="color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:.85rem;text-align:center;">Loading exam dates…</p>
    </section>

    <!-- Other admin-added dates that don't fit the exam-ring cards above -->
    <section style="max-width:560px;margin:3rem auto 0;">
      <h2 style="font-family:'Fraunces',serif;font-size:1.3rem;text-align:center;color:var(--text-main,#0B1C2E);margin-bottom:1rem;">Other Important Dates</h2>
      <ul class="timeline-list" id="other-dates-list" style="margin:0 auto;">
        <li style="color:var(--moss-600);font-family:var(--font-mono);font-size:.85rem;">Loading…</li>
      </ul>
    </section>

</main>

<footer style="margin-top:3rem;">
  <div class="container">
    <div class="footer-bottom">© AgriStudent BD — All Rights Reserved.</div>
  </div>
</footer>

<script type="module" src="js/timeline.js"></script>
<script src="js/main.js"></script>
</body>
</html>
