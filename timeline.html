<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic Timeline — AgriStudent BD</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ============================================================ -->
  <!-- PASTE YOUR EXISTING MARQUEE BAR + HEADER + NAV HERE           -->
  <!-- (copy exactly from resources.html or any other built page)    -->
  <!-- ============================================================ -->

  <main class="timeline-page">

    <section class="page-hero seed-packet-hero">
      <h1>Academic Timeline</h1>
      <p>Registration windows, exams, results, and holidays — all in one place.</p>
    </section>

    <section class="timeline-controls">
      <div class="control-group">
        <label for="termFilter">Term</label>
        <select id="termFilter">
          <option value="all">All Terms</option>
        </select>
      </div>

      <div class="control-group">
        <label for="categoryFilter">Category</label>
        <select id="categoryFilter">
          <option value="all">All Categories</option>
          <option value="registration">Registration</option>
          <option value="class">Class</option>
          <option value="midterm">Midterm</option>
          <option value="final">Final</option>
          <option value="result">Result</option>
          <option value="holiday">Holiday</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="view-toggle" role="group" aria-label="Switch view">
        <button class="view-btn active" data-view="list" id="listViewBtn">List View</button>
        <button class="view-btn" data-view="calendar" id="calendarViewBtn">Calendar View</button>
      </div>
    </section>

    <section class="timeline-legend" aria-hidden="false">
      <span class="legend-item"><i class="legend-swatch swatch-today"></i> Today</span>
      <span class="legend-item"><i class="legend-swatch swatch-path"></i> Countdown to next event</span>
      <span class="legend-item"><i class="legend-dot cat-registration"></i> Registration</span>
      <span class="legend-item"><i class="legend-dot cat-class"></i> Class</span>
      <span class="legend-item"><i class="legend-dot cat-midterm"></i> Midterm</span>
      <span class="legend-item"><i class="legend-dot cat-final"></i> Final</span>
      <span class="legend-item"><i class="legend-dot cat-result"></i> Result</span>
      <span class="legend-item"><i class="legend-dot cat-holiday"></i> Holiday</span>
      <span class="legend-item"><i class="legend-dot cat-other"></i> Other</span>
    </section>

    <!-- LIST VIEW -->
    <section id="listView" class="timeline-list-view">
      <div id="nextEventCard" class="next-event-card" hidden>
        <span class="next-event-label">Up Next</span>
        <h3 id="nextEventTitle"></h3>
        <p id="nextEventDate"></p>
        <p id="nextEventCountdown" class="countdown"></p>
      </div>

      <div id="timelineEmpty" class="timeline-empty" hidden>
        No events to show for this filter yet — check back soon 🌱
      </div>

      <div id="timelineList" class="timeline-vertical"></div>
    </section>

    <!-- CALENDAR VIEW -->
    <section id="calendarView" class="timeline-calendar-view" hidden>
      <div class="calendar-nav">
        <button id="prevMonth" aria-label="Previous month">‹</button>
        <h2 id="calendarMonthLabel"></h2>
        <button id="nextMonth" aria-label="Next month">›</button>
      </div>

      <div class="calendar-grid" id="calendarGrid"></div>

      <div id="calendarDayDetails" class="calendar-day-details" hidden></div>
    </section>

  </main>

  <!-- ============================================================ -->
  <!-- PASTE YOUR EXISTING FOOTER HERE                                -->
  <!-- ============================================================ -->

  <script src="js/firebase-config.js"></script>
  <script src="js/main.js"></script>
  <script src="js/timeline.js"></script>
</body>
</html>
