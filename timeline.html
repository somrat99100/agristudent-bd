<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic Timeline — AgriStudent BD</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ============================================================ -->
  <!-- PASTE YOUR EXISTING MARQUEE BAR + HEADER + NAV HERE           -->
  <!-- ============================================================ -->

  <main class="timeline-page">

    <section class="page-hero seed-packet-hero">
      <h1 id="calendarTitle">Academic Calendar</h1>
      <p id="calendarSubtitle">Summer Semester 2026</p>
    </section>

    <section class="control-group" style="max-width:220px; margin-bottom:1.2rem;">
      <label for="termFilter">Term</label>
      <select id="termFilter">
        <option value="all">All Terms</option>
      </select>
    </section>

    <section class="calendar-table-wrap">
      <table class="calendar-table">
        <thead>
          <tr>
            <th>Activities</th>
            <th>Dates</th>
            <th>Marks</th>
            <th>Remarks</th>
          </tr>
        </thead>
        <tbody id="calendarTableBody">
          <!-- rows injected by timeline.js -->
        </tbody>
      </table>
    </section>

    <p id="timelineEmpty" class="timeline-empty" hidden>
      No calendar entries yet — check back soon 🌱
    </p>

  </main>

  <!-- ============================================================ -->
  <!-- PASTE YOUR EXISTING FOOTER HERE                                -->
  <!-- ============================================================ -->

  <script src="js/firebase-config.js"></script>
  <script src="js/main.js"></script>
  <script src="js/timeline.js"></script>
</body>
</html>
