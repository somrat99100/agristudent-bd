<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viewing Resource — AgriStudent BD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body oncontextmenu="return false;" style="margin:0;">

<div id="loading-mask" class="loading-mask">
  <div class="loading-spinner"></div>
  <div class="loading-text">Fetching Document...</div>
</div>

<div class="viewer-bar">
  <a href="javascript:history.back()" class="back-link">← Back</a>
  <span class="title" id="viewer-title">Loading…</span>
  <span style="width:74px;"></span>
</div>

<div class="viewer-bg">
  <div class="viewer-book">
    <div class="spine"></div>
    <div class="viewer-frame-wrap" id="viewer-frame-wrap">
      </div>
    
    <div class="book-controls" id="book-controls" style="display: none;">
      <button id="btn-prev" class="book-btn" disabled>◀ Prev</button>
      <div class="page-indicator">Page <span id="page-num">0</span> of <span id="page-count">0</span></div>
      <button id="btn-next" class="book-btn">Next ▶</button>
    </div>
  </div>
</div>

<div class="viewer-watermark" id="viewer-watermark"></div>

<script>
  // Setup global worker for PDF.js
  const pdfjsLib = window['pdfjs-dist/build/pdf'];
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const params = new URLSearchParams(window.location.search);
  const fileUrl = params.get("url");
  const fileName = params.get("name") || "Document";
  const wrap = document.getElementById("viewer-frame-wrap");
  const controls = document.getElementById("book-controls");
  const loadingMask = document.getElementById("loading-mask");

  document.getElementById("viewer-title").textContent = fileName;
  document.title = fileName + " — AgriStudent BD";

  // PDF.js State
  let pdfDoc = null;
  let pageNum = 1;
  let pageRendering = false;
  let pageNumPending = null;

  const ALLOWED_HOSTS = [
    window.location.hostname,
    "raw.githubusercontent.com",
    "drive.google.com",
    "docs.google.com",
    "res.cloudinary.com"
  ];

  function isAllowedUrl(urlStr) {
    try {
      const u = new URL(urlStr, window.location.href);
      if (u.protocol !== "https:" && u.protocol !== "http:") return false;
      return ALLOWED_HOSTS.includes(u.hostname) || u.hostname === "localhost" || u.hostname === "127.0.0.1";
    } catch (e) {
      return false;
    }
  }

  if (fileUrl) {
    if (!isAllowedUrl(fileUrl)) {
      wrap.innerHTML = `<p style="text-align:center;padding:3rem;color:var(--terracotta-500);">This file's source isn't recognized and can't be displayed.</p>`;
      loadingMask.classList.add("hidden"); // Hide loader on error
    } else {
      const isImage = /\.(jpg|jpeg|png|gif|webp)$/i.test(fileName);
      if (isImage) {
        wrap.innerHTML = `<img src="${fileUrl}" alt="${fileName}" style="width:100%; height:100%; object-fit:contain;">`;
        loadingMask.classList.add("hidden"); // Hide loader immediately for simple images
      } else {
        // Init PDF Book
        pdfjsLib.getDocument(fileUrl).promise.then((pdfDoc_) => {
          pdfDoc = pdfDoc_;
          document.getElementById('page-count').textContent = pdfDoc.numPages;
          controls.style.display = 'flex'; // Show controls
          
          // Render the first page
          renderPage(pageNum, 'init').then(() => {
            // HIDE THE LOADING MASK ONCE THE FIRST PAGE IS READY
            loadingMask.classList.add("hidden");
          });

        }).catch((err) => {
          wrap.innerHTML = `<p style="text-align:center;padding:3rem;color:var(--terracotta-500);">Error loading PDF: ${err.message}</p>`;
          loadingMask.classList.add("hidden"); // Hide loader on error
        });
      }
    }
  } else {
    wrap.innerHTML = `<p style="text-align:center;padding:3rem;color:var(--terracotta-500);">No file specified.</p>`;
    loadingMask.classList.add("hidden"); // Hide loader if missing file
  }

  // --- Render and Animation Logic ---
  async function renderPage(num, direction = 'forward') {
    pageRendering = true;
    
    try {
      const page = await pdfDoc.getPage(num);
      
      const wrapRect = wrap.getBoundingClientRect();
      const viewportUnscaled = page.getViewport({ scale: 1 });
      const scale = Math.min(
        wrapRect.width / viewportUnscaled.width,
        wrapRect.height / viewportUnscaled.height
      );
      const viewport = page.getViewport({ scale: scale * 1.5 });

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.height = viewport.height;
      canvas.width = viewport.width;

      const renderContext = {
        canvasContext: ctx,
        viewport: viewport
      };

      await page.render(renderContext).promise;

      const pageDiv = document.createElement('div');
      pageDiv.className = 'book-page';
      
      if (direction === 'forward') {
        pageDiv.classList.add('in-right');
      } else if (direction === 'backward') {
        pageDiv.classList.add('in-left');
      }
      
      pageDiv.appendChild(canvas);
      wrap.appendChild(pageDiv);

      pageDiv.getBoundingClientRect(); // Force reflow

      const activePages = wrap.querySelectorAll('.book-page.active');

      pageDiv.classList.remove('in-right', 'in-left');
      pageDiv.classList.add('active');

      activePages.forEach(oldPage => {
        oldPage.classList.remove('active');
        if (direction === 'forward') {
          oldPage.classList.add('out-left');
        } else if (direction === 'backward') {
          oldPage.classList.add('out-right');
        } else {
          oldPage.style.opacity = '0';
        }
        
        setTimeout(() => {
          if (oldPage.parentElement) oldPage.parentElement.removeChild(oldPage);
        }, 600);
      });

      document.getElementById('page-num').textContent = num;
      updateButtons();
      pageRendering = false;

      if (pageNumPending !== null) {
        const pendingNum = pageNumPending;
        const pendingDir = pageNumPending > num ? 'forward' : 'backward';
        pageNumPending = null;
        renderPage(pendingNum, pendingDir);
      }
    } catch (err) {
      pageRendering = false;
      console.error("Error rendering page:", err);
    }
  }

  function queueRenderPage(num, direction) {
    if (pageRendering) {
      pageNumPending = num;
    } else {
      renderPage(num, direction);
    }
  }

  function updateButtons() {
    document.getElementById('btn-prev').disabled = pageNum <= 1;
    document.getElementById('btn-next').disabled = pageNum >= pdfDoc.numPages;
  }

  // --- Interactions ---
  document.getElementById('btn-prev').addEventListener('click', () => {
    if (pageNum <= 1) return;
    pageNum--;
    queueRenderPage(pageNum, 'backward');
  });

  document.getElementById('btn-next').addEventListener('click', () => {
    if (pageNum >= pdfDoc.numPages) return;
    pageNum++;
    queueRenderPage(pageNum, 'forward');
  });

  document.addEventListener("keydown", (e) => {
    if ((e.ctrlKey || e.metaKey) && (e.key === "s" || e.key === "p")) {
      e.preventDefault();
    }
    if (e.key === "ArrowRight" && pdfDoc && pageNum < pdfDoc.numPages) {
      pageNum++;
      queueRenderPage(pageNum, 'forward');
    }
    if (e.key === "ArrowLeft" && pdfDoc && pageNum > 1) {
      pageNum--;
      queueRenderPage(pageNum, 'backward');
    }
  });

  document.getElementById("viewer-watermark").textContent =
    "AgriStudent BD · viewed " + new Date().toLocaleString();
</script>

</body>
</html>
