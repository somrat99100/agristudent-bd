<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viewing Resource — AgriStudent BD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body oncontextmenu="return false;" style="margin:0;">

<div class="viewer-bar">
  <a href="javascript:history.back()" class="back-link">← Back</a>
  <span class="title" id="viewer-title">Loading…</span>
  <span class="viewer-pagectrl hidden" id="viewer-pagectrl">
    <button type="button" id="page-prev" aria-label="Previous page">‹</button>
    <span id="page-indicator">1 / 1</span>
    <button type="button" id="page-next" aria-label="Next page">›</button>
  </span>
</div>

<div class="viewer-bg">
  <div class="viewer-book">
    <div class="spine"></div>
    <div class="viewer-frame-wrap" id="viewer-frame-wrap">
      <p style="text-align:center;padding:3rem;color:var(--moss-600);font-family:var(--font-mono);font-size:.85rem;">Loading document…</p>
    </div>
  </div>
</div>

<div class="viewer-watermark" id="viewer-watermark"></div>

<script>
  // Read-only viewer: opens files in-page, same tab, no native download toolbar
  // where the browser allows hiding it. NOTE: no web technology can fully block
  // screenshots or determined downloads — this raises friction, not a hard lock.
  //
  // Two modes:
  //   1) ?url=<file>          single file (PDF via native renderer, or an image)
  //   2) ?pages=<json-array>  multi-page image mode — page images rendered as <img>,
  //      no PDF handed to the OS/native viewer, so no mobile "download/open" popup.
  //      Pass a JSON array of image URLs, e.g.
  //      ?pages=["https://res.cloudinary.com/.../p1.jpg","https://res.cloudinary.com/.../p2.jpg"]
  const params = new URLSearchParams(window.location.search);
  const fileUrl = params.get("url");
  const pagesParam = params.get("pages");
  const fileName = params.get("name") || "Document";
  const wrap = document.getElementById("viewer-frame-wrap");
  const pagectrl = document.getElementById("viewer-pagectrl");
  const pageIndicator = document.getElementById("page-indicator");
  const btnPrev = document.getElementById("page-prev");
  const btnNext = document.getElementById("page-next");

  document.getElementById("viewer-title").textContent = fileName;
  document.title = fileName + " — AgriStudent BD";

  // Allowlist check: only render files hosted on domains we trust.
  // Edit ALLOWED_HOSTS to match wherever your course files actually live
  // (e.g. your GitHub Pages domain, a Drive/CDN host, etc).
  const ALLOWED_HOSTS = [
    window.location.hostname,
    "raw.githubusercontent.com",
    "drive.google.com",
    "docs.google.com",
    "res.cloudinary.com"
  ];

  function isAllowedUrl(urlStr) {
    try {
      const u = new URL(urlStr, window.location.href);
      if (u.protocol !== "https:" && u.protocol !== "http:") return false;
      return ALLOWED_HOSTS.includes(u.hostname);
    } catch (e) {
      return false;
    }
  }

  function showBlocked() {
    wrap.innerHTML = `<p style="text-align:center;padding:3rem;color:var(--terracotta-500);">This file's source isn't recognized and can't be displayed.</p>`;
  }

  function showNone() {
    wrap.innerHTML = `<p style="text-align:center;padding:3rem;color:var(--terracotta-500);">No file specified.</p>`;
  }

  // ---------- Multi-page image mode (with page-turn animation) ----------
  function renderPageMode(urls) {
    const valid = urls.filter(isAllowedUrl);
    if (valid.length === 0) { showBlocked(); return; }

    let current = 0;
    let animating = false;

    wrap.innerHTML = `
      <div class="flip-stage">
        <img class="flip-base" id="flip-base" alt="${fileName} — page 1">
        <div class="flip-leaf" id="flip-leaf">
          <div class="flip-face flip-front"><img id="flip-front-img" alt=""></div>
          <div class="flip-face flip-back"><img id="flip-back-img" alt=""></div>
        </div>
      </div>`;

    const base = document.getElementById("flip-base");
    const leaf = document.getElementById("flip-leaf");
    const frontImg = document.getElementById("flip-front-img");
    const backImg = document.getElementById("flip-back-img");
    pagectrl.classList.remove("hidden");

    function setIndicator() {
      pageIndicator.textContent = (current + 1) + " / " + valid.length;
      btnPrev.disabled = current === 0 || animating;
      btnNext.disabled = current === valid.length - 1 || animating;
    }

    // Show a page with no animation (first load / fallback)
    function showStatic(i) {
      current = Math.max(0, Math.min(i, valid.length - 1));
      base.src = valid[current];
      base.alt = fileName + " — page " + (current + 1);
      setIndicator();
    }

    // direction: "forward" (next, right-to-left turn) or "back" (prev, left-to-right turn)
    function turnTo(i, direction) {
      if (animating) return;
      const target = Math.max(0, Math.min(i, valid.length - 1));
      if (target === current) return;
      animating = true;

      const fromSrc = valid[current];
      const toSrc = valid[target];

      if (direction === "forward") {
        // Current page sits on top, flips away left-to-right(out), revealing next underneath
        base.src = toSrc;
        frontImg.src = fromSrc;
        backImg.src = toSrc;
        leaf.style.transformOrigin = "left center";
        leaf.classList.remove("hidden");
        leaf.style.transition = "none";
        leaf.style.transform = "rotateY(0deg)";
        // force reflow
        void leaf.offsetWidth;
        leaf.style.transition = "transform .6s cubic-bezier(.4,.1,.2,1)";
        leaf.style.transform = "rotateY(-180deg)";
      } else {
        // Bring previous page in from the left, flipping it down over the current one
        base.src = fromSrc;
        frontImg.src = toSrc;
        backImg.src = fromSrc;
        leaf.style.transformOrigin = "left center";
        leaf.classList.remove("hidden");
        leaf.style.transition = "none";
        leaf.style.transform = "rotateY(-180deg)";
        void leaf.offsetWidth;
        leaf.style.transition = "transform .6s cubic-bezier(.4,.1,.2,1)";
        leaf.style.transform = "rotateY(0deg)";
      }

      const onEnd = () => {
        leaf.removeEventListener("transitionend", onEnd);
        base.src = toSrc;
        base.alt = fileName + " — page " + (target + 1);
        leaf.classList.add("hidden");
        leaf.style.transition = "none";
        current = target;
        animating = false;
        setIndicator();
      };
      leaf.addEventListener("transitionend", onEnd);
    }

    btnPrev.addEventListener("click", () => turnTo(current - 1, "back"));
    btnNext.addEventListener("click", () => turnTo(current + 1, "forward"));
    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") turnTo(current - 1, "back");
      if (e.key === "ArrowRight") turnTo(current + 1, "forward");
    });

    // Swipe support for touch devices
    let touchStartX = null;
    wrap.addEventListener("touchstart", (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
    wrap.addEventListener("touchend", (e) => {
      if (touchStartX === null) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 40) {
        if (dx < 0) turnTo(current + 1, "forward");
        else turnTo(current - 1, "back");
      }
      touchStartX = null;
    }, { passive: true });

    showStatic(0);
  }

  // ---------- Single file mode ----------
  function renderFileMode(urlStr) {
    if (!isAllowedUrl(urlStr)) { showBlocked(); return; }
    const isImage = /\.(jpg|jpeg|png|gif|webp)$/i.test(fileName);
    if (isImage) {
      wrap.innerHTML = `<img src="${urlStr}" alt="${fileName}">`;
    } else {
      // Native browser PDF rendering, full size, toolbar/sidebar hidden where supported
      // (desktop Chrome/Edge). On many mobile browsers this still hands off to a native
      // viewer with its own download/open chrome — that's a platform limitation we can't
      // suppress from here. Use ?pages=[...] mode instead to avoid it entirely.
      const pdfSrc = urlStr + "#toolbar=0&navpanes=0&scrollbar=1&view=FitH";
      wrap.innerHTML = `<iframe src="${pdfSrc}" title="${fileName}"></iframe>`;
    }
  }

  if (pagesParam) {
    try {
      const urls = JSON.parse(pagesParam);
      if (Array.isArray(urls) && urls.length > 0) {
        renderPageMode(urls);
      } else {
        showNone();
      }
    } catch (e) {
      showBlocked();
    }
  } else if (fileUrl) {
    renderFileMode(fileUrl);
  } else {
    showNone();
  }

  // Light deterrents — friction only, not real protection:
  document.addEventListener("keydown", (e) => {
    if ((e.ctrlKey || e.metaKey) && (e.key === "s" || e.key === "p")) {
      e.preventDefault();
    }
  });

  document.getElementById("viewer-watermark").textContent =
    "AgriStudent BD · viewed " + new Date().toLocaleString();
</script>

</body>
</html>
