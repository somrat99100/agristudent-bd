<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Viewing Resource — AgriStudent BD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=JetBrains+Mono:wght@500;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body class="viewer-layout" oncontextmenu="return false;">

<div id="loading-mask" class="loading-mask">
  <div class="loading-spinner"></div>
  <div class="loading-text">Preparing Document...</div>
</div>

<div class="viewer-bar">
  <a href="javascript:history.back()" class="back-link">← Back</a>
  <span class="title" id="viewer-title">Loading…</span>
  <span style="width:80px;"></span> </div>

<div class="viewer-bg">
  <div class="viewer-book">
    <div class="viewer-frame-wrap" id="viewer-frame-wrap" title="Double-click to magnify">
      <div class="spine"></div>
      </div>
    
    <div class="book-controls" id="book-controls" style="display: none;">
      <button id="btn-prev" class="book-btn" disabled>◀ Prev</button>
      
      <div class="page-indicator">
        Page <input type="number" id="page-input" class="page-search-input" value="0" min="1"> of <span id="page-count">0</span>
      </div>
      
      <button id="btn-next" class="book-btn">Next ▶</button>
    </div>
  </div>
</div>

<div class="viewer-watermark" id="viewer-watermark"></div>

<script>
  const pdfjs = window.pdfjsLib;
  const wrap = document.getElementById("viewer-frame-wrap");
  const controls = document.getElementById("book-controls");
  const loadingMask = document.getElementById("loading-mask");
  const pageInput = document.getElementById("page-input");

  const params = new URLSearchParams(window.location.search);
  const fileUrl = params.get("url");
  const fileName = params.get("name") || "Document";

  document.getElementById("viewer-title").textContent = fileName;
  document.title = fileName + " — AgriStudent BD";

  if (!pdfjs) {
    wrap.innerHTML = `<p style="text-align:center;padding:3rem;color:#C97D3C;font-family:var(--font-mono);">Engine failed to load. Please refresh.</p>`;
    loadingMask.classList.add("hidden");
  } else {
    pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    
    let pdfDoc = null;
    let pageNum = 1;
    let pageRendering = false;
    let pageNumPending = null;
    let isZoomed = false; 

    // Allowlist protection
    const ALLOWED_HOSTS = [
      window.location.hostname, "raw.githubusercontent.com", 
      "drive.google.com", "docs.google.com", "res.cloudinary.com"
    ];

    function isAllowedUrl(urlStr) {
      try {
        const u = new URL(urlStr, window.location.href);
        return ALLOWED_HOSTS.includes(u.hostname) || u.hostname === "localhost" || u.hostname === "127.0.0.1";
      } catch (e) { return false; }
    }

    if (fileUrl) {
      if (!isAllowedUrl(fileUrl)) {
        wrap.innerHTML = `<p style="text-align:center;padding:3rem;color:var(--terracotta-500);">Source blocked.</p>`;
        loadingMask.classList.add("hidden"); 
      } else {
        const isImage = /\.(jpg|jpeg|png|gif|webp)$/i.test(fileName);
        if (isImage) {
          wrap.innerHTML = `<img src="${fileUrl}" alt="${fileName}" style="width:100%; height:100%; object-fit:contain; margin-left:12px;">`;
          loadingMask.classList.add("hidden"); 
        } else {
          pdfjs.getDocument(fileUrl).promise.then((pdfDoc_) => {
            pdfDoc = pdfDoc_;
            document.getElementById('page-count').textContent = pdfDoc.numPages;
            pageInput.max = pdfDoc.numPages;
            controls.style.display = 'flex'; 
            
            renderPage(pageNum, 'init').then(() => {
              loadingMask.classList.add("hidden");
            });
          }).catch((err) => {
            wrap.innerHTML = `<p style="text-align:center;padding:3rem;color:var(--terracotta-500);">Error: ${err.message}</p>`;
            loadingMask.classList.add("hidden"); 
          });
        }
      }
    } else {
      loadingMask.classList.add("hidden"); 
    }

    // --- Core HD Rendering ---
    async function renderPage(num, direction = 'forward') {
      pageRendering = true;
      isZoomed = false; 
      
      try {
        const page = await pdfDoc.getPage(num);
        const wrapRect = wrap.getBoundingClientRect();
        
        // Dynamic fallback sizing to prevent zero-calc errors
        const containerWidth = wrapRect.width > 0 ? wrapRect.width : 800;
        const containerHeight = wrapRect.height > 0 ? wrapRect.height : 600;

        const viewportUnscaled = page.getViewport({ scale: 1 });
        const scale = Math.min(
          containerWidth / viewportUnscaled.width,
          containerHeight / viewportUnscaled.height
        );
        
        const viewport = page.getViewport({ scale: scale });
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        
        // Crystal Clear HD rendering
        const outputScale = Math.max(window.devicePixelRatio || 1, 2);
        canvas.width = Math.floor(viewport.width * outputScale);
        canvas.height = Math.floor(viewport.height * outputScale);
        canvas.style.width = Math.floor(viewport.width) + "px";
        canvas.style.height = Math.floor(viewport.height) + "px";

        const transform = outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null;

        await page.render({ canvasContext: ctx, transform: transform, viewport: viewport }).promise;

        const pageDiv = document.createElement('div');
        pageDiv.className = 'book-page';
        
        if (direction === 'forward') pageDiv.classList.add('in-right');
        else if (direction === 'backward') pageDiv.classList.add('in-left');
        
        pageDiv.appendChild(canvas);
        wrap.appendChild(pageDiv);
        pageDiv.getBoundingClientRect(); // Force reflow for animation

        const activePages = wrap.querySelectorAll('.book-page.active');
        pageDiv.classList.remove('in-right', 'in-left');
        pageDiv.classList.add('active');

        activePages.forEach(oldPage => {
          oldPage.classList.remove('active');
          if (direction === 'forward') oldPage.classList.add('out-left');
          else if (direction === 'backward') oldPage.classList.add('out-right');
          else oldPage.style.opacity = '0';
          
          setTimeout(() => {
            if (oldPage.parentElement) oldPage.parentElement.removeChild(oldPage);
          }, 750); // Matches the new slower, heavier CSS animation
        });

        pageInput.value = num;
        document.getElementById('btn-prev').disabled = num <= 1;
        document.getElementById('btn-next').disabled = num >= pdfDoc.numPages;
        pageRendering = false;

        if (pageNumPending !== null) {
          const pendingNum = pageNumPending;
          const pendingDir = pageNumPending > num ? 'forward' : 'backward';
          pageNumPending = null;
          renderPage(pendingNum, pendingDir);
        }
      } catch (err) {
        pageRendering = false;
        loadingMask.classList.add("hidden");
      }
    }

    function queueRenderPage(num, direction) {
      if (pageRendering) pageNumPending = num;
      else renderPage(num, direction);
    }

    // --- Inputs & Controls ---
    pageInput.addEventListener('change', (e) => {
      let desiredPage = parseInt(e.target.value);
      if (isNaN(desiredPage) || desiredPage < 1) desiredPage = 1;
      if (desiredPage > pdfDoc.numPages) desiredPage = pdfDoc.numPages;
      if (desiredPage !== pageNum) {
        const direction = desiredPage > pageNum ? 'forward' : 'backward';
        pageNum = desiredPage;
        queueRenderPage(pageNum, direction);
      } else { e.target.value = pageNum; }
    });

    document.getElementById('btn-prev').addEventListener('click', () => {
      if (pageNum <= 1) return;
      pageNum--; queueRenderPage(pageNum, 'backward');
    });

    document.getElementById('btn-next').addEventListener('click', () => {
      if (pageNum >= pdfDoc.numPages) return;
      pageNum++; queueRenderPage(pageNum, 'forward');
    });

    // --- Premium Double-Click Zoom & Pan ---
    wrap.addEventListener('dblclick', (e) => {
      const activePage = wrap.querySelector('.book-page.active');
      if (!activePage) return;
      
      const canvas = activePage.querySelector('canvas');
      isZoomed = !isZoomed;
      
      if (isZoomed) {
        activePage.classList.add('is-zoomed');
        canvas.style.transform = 'scale(2.4)'; 
        canvas.style.cursor = 'grab';
        
        const clickX = e.clientX - activePage.getBoundingClientRect().left;
        const clickY = e.clientY - activePage.getBoundingClientRect().top;
        setTimeout(() => {
          activePage.scrollLeft = clickX;
          activePage.scrollTop = clickY;
        }, 50);

      } else {
        activePage.classList.remove('is-zoomed');
        canvas.style.transform = 'scale(1)';
        canvas.style.cursor = 'default';
        activePage.scrollTop = 0; activePage.scrollLeft = 0;
      }
    });

    let isDragging = false, startX, startY, scrollLeft, scrollTop;
    wrap.addEventListener('mousedown', (e) => {
      if (!isZoomed || e.pointerType === 'touch') return;
      isDragging = true;
      const activePage = wrap.querySelector('.book-page.active');
      const canvas = activePage.querySelector('canvas');
      
      canvas.classList.add('is-dragging');
      startX = e.pageX - activePage.offsetLeft;
      startY = e.pageY - activePage.offsetTop;
      scrollLeft = activePage.scrollLeft;
      scrollTop = activePage.scrollTop;
    });
    
    wrap.addEventListener('mouseleave', () => { isDragging = false; });
    
    window.addEventListener('mouseup', () => { 
      isDragging = false; 
      if(isZoomed) {
        const activeCanvas = wrap.querySelector('.book-page.active canvas');
        if(activeCanvas) activeCanvas.classList.remove('is-dragging');
      }
    });
    
    wrap.addEventListener('mousemove', (e) => {
      if (!isDragging || !isZoomed) return;
      e.preventDefault();
      const activePage = wrap.querySelector('.book-page.active');
      const x = e.pageX - activePage.offsetLeft;
      const y = e.pageY - activePage.offsetTop;
      activePage.scrollLeft = scrollLeft - (x - startX);
      activePage.scrollTop = scrollTop - (y - startY);
    });

    // Keyboard Shortcuts
    document.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && (e.key === "s" || e.key === "p")) e.preventDefault();
      if (document.activeElement !== pageInput) {
        if (e.key === "ArrowRight" && pdfDoc && pageNum < pdfDoc.numPages) {
          pageNum++; queueRenderPage(pageNum, 'forward');
        }
        if (e.key === "ArrowLeft" && pdfDoc && pageNum > 1) {
          pageNum--; queueRenderPage(pageNum, 'backward');
        }
      }
    });
  } 

  document.getElementById("viewer-watermark").textContent =
    "AgriStudent BD · viewed " + new Date().toLocaleString();
</script>
</body>
</html>
