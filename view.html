<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' blob: https://www.gstatic.com https://cdnjs.cloudflare.com https://www.googletagmanager.com; worker-src blob: https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://res.cloudinary.com https://lh3.googleusercontent.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://api.cloudinary.com https://res.cloudinary.com; frame-src https://view.officeapps.live.com; object-src 'none'; base-uri 'self';">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="manifest" href="manifest.json">
<title>Viewing Resource — AgriStudent BD</title>
<script src="js/auth-guard.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=JetBrains+Mono:wght@500;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body class="viewer-layout" oncontextmenu="return false;">

<div id="loading-mask" class="loading-mask">
  <div class="loading-spinner"></div>
  <div class="loading-text">Preparing Document...</div>
</div>

<div class="viewer-bar">
  <a href="javascript:history.back()" class="back-link">← Back</a>
  <span class="title" id="viewer-title">Loading…</span>
  <span style="width:80px;"></span>
</div>

<div class="viewer-bg">
  <div class="viewer-book">
    <div class="viewer-frame-wrap" id="viewer-frame-wrap" title="Double-click or pinch to magnify"></div>
    <div class="book-controls" id="book-controls" style="display:none;">
      <button id="btn-prev" class="book-btn" disabled>◀ Prev</button>
      <div class="page-indicator">
        Page <input type="number" id="page-input" class="page-search-input" value="0" min="1"> of <span id="page-count">0</span>
        <button id="btn-go" class="btn-go">Go</button>
      </div>
      <button id="btn-next" class="book-btn">Next ▶</button>
    </div>
  </div>
</div>

<div class="viewer-watermark" id="viewer-watermark"></div>

<script>
  const pdfjs = window.pdfjsLib;
  const wrap = document.getElementById("viewer-frame-wrap");
  const controls = document.getElementById("book-controls");
  const loadingMask = document.getElementById("loading-mask");
  const pageInput = document.getElementById("page-input");
  const btnGo = document.getElementById("btn-go");

  const params = new URLSearchParams(window.location.search);
  let fileUrl = params.get("url");
  const fileName = params.get("name") || "Document";

  // Cloudinary serves PDFs as /image/upload/ with wrong content-type by default.
  // Add fl_attachment transformation so it returns application/pdf.
  // We do NOT rewrite to /raw/upload/ — that path doesn't exist for uploaded files.
  if (fileUrl && fileUrl.includes("res.cloudinary.com") && fileUrl.includes("/image/upload/")) {
    // Insert fl_attachment flag after /image/upload/
    fileUrl = fileUrl.replace("/image/upload/", "/image/upload/fl_attachment/");
  }

  document.getElementById("viewer-title").textContent = fileName;
  document.title = fileName + " — AgriStudent BD";

  function showError(msg) {
    wrap.innerHTML = `<p style="text-align:center;padding:3rem;color:var(--terracotta-500);font-family:var(--font-mono);font-size:.9rem;">${msg}</p>`;
    loadingMask.classList.add("hidden");
  }

  const ALLOWED_HOSTS = [
    window.location.hostname,
    "raw.githubusercontent.com",
    "drive.google.com",
    "docs.google.com",
    "res.cloudinary.com"
  ];

  function isAllowedUrl(urlStr) {
    try {
      const u = new URL(urlStr, window.location.href);
      return ALLOWED_HOSTS.includes(u.hostname) || u.hostname === "localhost" || u.hostname === "127.0.0.1";
    } catch (e) { return false; }
  }

  if (!fileUrl) {
    loadingMask.classList.add("hidden");
  } else if (!isAllowedUrl(fileUrl)) {
    showError("Source blocked — file host not allowed.");
  } else {
    const ext = (fileName.split(".").pop() || "").toLowerCase();
    const isImage = ["jpg","jpeg","png","gif","webp"].includes(ext);
    const isOffice = ["ppt","pptx","doc","docx","xls","xlsx"].includes(ext);

    if (isImage) {
      const imgEl = document.createElement("img");
      imgEl.src = fileUrl;
      imgEl.alt = fileName;
      imgEl.style.cssText = "width:100%;height:100%;object-fit:contain;";
      imgEl.onload = () => loadingMask.classList.add("hidden");
      imgEl.onerror = () => showError("Could not load image.");
      wrap.appendChild(imgEl);

    } else if (isOffice) {
      const officeUrl = "https://view.officeapps.live.com/op/embed.aspx?src=" + encodeURIComponent(fileUrl);
      const iframe = document.createElement("iframe");
      iframe.src = officeUrl;
      iframe.title = fileName;
      iframe.style.cssText = "width:100%;height:100%;border:none;";
      iframe.onload = () => loadingMask.classList.add("hidden");
      wrap.appendChild(iframe);
      setTimeout(() => loadingMask.classList.add("hidden"), 4000);

    } else if (ext === "pdf") {
      if (!pdfjs) {
        showError("PDF engine failed to load. Please refresh.");
      } else {
        // Set workerSrc — must be the same version as pdf.min.js
        pdfjs.GlobalWorkerOptions.workerSrc =
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

        let pdfDoc = null;
        let pageNum = 1;
        let pageRendering = false;
        let pageNumPending = null;
        let currentScale = 1;

        pdfjs.getDocument({
          url: fileUrl,
          withCredentials: false,
          cMapUrl: "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/",
          cMapPacked: true,
        }).promise.then((pdfDoc_) => {
          pdfDoc = pdfDoc_;
          document.getElementById("page-count").textContent = pdfDoc.numPages;
          pageInput.max = pdfDoc.numPages;
          controls.style.display = "flex";
          renderPage(pageNum, "init").then(() => loadingMask.classList.add("hidden"));
        }).catch((err) => {
          console.error("[Viewer] PDF load failed:", err);
          showError("Could not load PDF. Please go back and try again.");
        });

        async function renderPage(num, direction = "forward") {
          pageRendering = true;
          try {
            const page = await pdfDoc.getPage(num);
            const wrapRect = wrap.getBoundingClientRect();
            const containerWidth = wrapRect.width > 0 ? wrapRect.width : 800;
            const containerHeight = wrapRect.height > 0 ? wrapRect.height : 1000;
            const viewportUnscaled = page.getViewport({ scale: 1 });
            const padding = 16;
            const scale = Math.min(
              (containerWidth - padding) / viewportUnscaled.width,
              (containerHeight - padding) / viewportUnscaled.height
            );
            const viewport = page.getViewport({ scale });
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");
            const outputScale = Math.max(window.devicePixelRatio || 1, 4);
            canvas.width = Math.floor(viewport.width * outputScale);
            canvas.height = Math.floor(viewport.height * outputScale);
            canvas.style.width = Math.floor(viewport.width) + "px";
            canvas.style.height = Math.floor(viewport.height) + "px";
            const transform = outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null;
            await page.render({ canvasContext: ctx, transform, viewport }).promise;

            const pageDiv = document.createElement("div");
            pageDiv.className = "book-page";
            if (currentScale > 1) {
              pageDiv.classList.add("is-zoomed");
              canvas.style.transform = `scale(${currentScale})`;
              canvas.style.cursor = "grab";
            }
            if (direction === "forward") pageDiv.classList.add("in-right");
            else if (direction === "backward") pageDiv.classList.add("in-left");
            pageDiv.appendChild(canvas);
            wrap.appendChild(pageDiv);
            pageDiv.getBoundingClientRect();

            const activePages = wrap.querySelectorAll(".book-page.active");
            pageDiv.classList.remove("in-right","in-left");
            pageDiv.classList.add("active");
            activePages.forEach(old => {
              old.classList.remove("active");
              if (direction === "forward") old.classList.add("out-left");
              else if (direction === "backward") old.classList.add("out-right");
              else old.style.opacity = "0";
              setTimeout(() => old.parentElement?.removeChild(old), 750);
            });

            pageInput.value = num;
            document.getElementById("btn-prev").disabled = num <= 1;
            document.getElementById("btn-next").disabled = num >= pdfDoc.numPages;
            pageRendering = false;
            if (pageNumPending !== null) {
              const p = pageNumPending, d = p > num ? "forward" : "backward";
              pageNumPending = null;
              renderPage(p, d);
            }
          } catch (err) {
            console.error("[Viewer] renderPage failed:", err);
            pageRendering = false;
            loadingMask.classList.add("hidden");
          }
        }

        function queueRenderPage(num, dir) {
          if (pageRendering) pageNumPending = num;
          else renderPage(num, dir);
        }

        function triggerPageSearch() {
          let p = parseInt(pageInput.value);
          if (isNaN(p) || p < 1) p = 1;
          if (p > pdfDoc.numPages) p = pdfDoc.numPages;
          if (p !== pageNum) { const d = p > pageNum ? "forward" : "backward"; pageNum = p; queueRenderPage(pageNum, d); }
          else pageInput.value = pageNum;
        }

        btnGo.addEventListener("click", triggerPageSearch);
        pageInput.addEventListener("keypress", e => { if (e.key === "Enter") triggerPageSearch(); });
        document.getElementById("btn-prev").addEventListener("click", () => { if (pageNum <= 1) return; pageNum--; queueRenderPage(pageNum, "backward"); });
        document.getElementById("btn-next").addEventListener("click", () => { if (pageNum >= pdfDoc.numPages) return; pageNum++; queueRenderPage(pageNum, "forward"); });

        // Double-click zoom
        wrap.addEventListener("dblclick", (e) => {
          const activePage = wrap.querySelector(".book-page.active");
          if (!activePage) return;
          const canvas = activePage.querySelector("canvas");
          if (currentScale > 1) {
            currentScale = 1;
            activePage.classList.remove("is-zoomed");
            canvas.style.transform = "scale(1)";
            canvas.style.cursor = "default";
            activePage.scrollTop = 0; activePage.scrollLeft = 0;
          } else {
            currentScale = 2.4;
            activePage.classList.add("is-zoomed");
            canvas.style.transform = `scale(${currentScale})`;
            canvas.style.cursor = "grab";
            const rect = activePage.getBoundingClientRect();
            setTimeout(() => {
              activePage.scrollLeft = (e.clientX - rect.left) * (currentScale - 1);
              activePage.scrollTop = (e.clientY - rect.top) * (currentScale - 1);
            }, 50);
          }
        });

        // Pinch zoom
        let initDist = null, initScale = 1;
        wrap.addEventListener("touchstart", e => {
          if (e.touches.length === 2) {
            e.preventDefault();
            initDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            initScale = currentScale;
            wrap.querySelector(".book-page.active")?.classList.add("is-zoomed");
          }
        }, { passive: false });
        wrap.addEventListener("touchmove", e => {
          if (e.touches.length !== 2) return;
          e.preventDefault();
          const activePage = wrap.querySelector(".book-page.active");
          if (!activePage) return;
          const canvas = activePage.querySelector("canvas");
          const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
          currentScale = Math.min(Math.max(1, initScale * (dist / initDist)), 4);
          canvas.style.transform = `scale(${currentScale})`;
          if (currentScale === 1) activePage.classList.remove("is-zoomed");
        }, { passive: false });
        wrap.addEventListener("touchend", e => { if (e.touches.length < 2) initDist = null; });

        // Mouse drag pan
        let isDragging = false, startX, startY, scrollL, scrollT;
        wrap.addEventListener("mousedown", e => {
          if (currentScale <= 1) return;
          isDragging = true;
          const ap = wrap.querySelector(".book-page.active");
          ap?.querySelector("canvas")?.classList.add("is-dragging");
          startX = e.pageX - (ap?.offsetLeft || 0);
          startY = e.pageY - (ap?.offsetTop || 0);
          scrollL = ap?.scrollLeft || 0;
          scrollT = ap?.scrollTop || 0;
        });
        wrap.addEventListener("mouseleave", () => { isDragging = false; });
        window.addEventListener("mouseup", () => {
          isDragging = false;
          wrap.querySelector(".book-page.active canvas")?.classList.remove("is-dragging");
        });
        wrap.addEventListener("mousemove", e => {
          if (!isDragging || currentScale <= 1) return;
          e.preventDefault();
          const ap = wrap.querySelector(".book-page.active");
          if (!ap) return;
          ap.scrollLeft = scrollL - (e.pageX - ap.offsetLeft - startX);
          ap.scrollTop = scrollT - (e.pageY - ap.offsetTop - startY);
        });

        // Keyboard
        document.addEventListener("keydown", e => {
          if ((e.ctrlKey || e.metaKey) && (e.key === "s" || e.key === "p")) e.preventDefault();
          if (document.activeElement !== pageInput) {
            if (e.key === "ArrowRight" && pdfDoc && pageNum < pdfDoc.numPages) { pageNum++; queueRenderPage(pageNum, "forward"); }
            if (e.key === "ArrowLeft" && pdfDoc && pageNum > 1) { pageNum--; queueRenderPage(pageNum, "backward"); }
          }
        });
      }
    } else {
      showError(`Unsupported file type: .${ext}`);
    }
  }

  document.getElementById("viewer-watermark").textContent =
    "AgriStudent BD · viewed " + new Date().toLocaleString();
</script>
</body>
</html>
