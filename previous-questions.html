<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suggestions — AgriStudent BD</title>
<script src="js/auth-guard.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar-placeholder"></div>
<script src="js/navbar-loader.js"></script>

<section class="section-page">
  <div class="container">
    <div class="crumb"><a href="index.html">Home</a> / <a href="resources.html">Resources</a> / Suggestions</div>
    <h1>💡 Suggestions</h1>
    <p style="color:var(--moss-600);max-width:560px;margin-bottom:1.4rem;">Filter by faculty, course code, or exam type.</p>

    <a href="resources.html#upload" class="btn-primary" style="display:inline-block;margin-bottom:2rem;">⬆️ Upload Resource</a>

    <div id="pq-gate" class="modal-overlay" style="position:static;background:none;padding:0;display:block;">
      <div class="modal-box" style="max-width:440px;margin:0 auto;">
        <div class="modal-body" style="text-align:center;">
          <div style="font-size:2.2rem;margin-bottom:.6rem;">🔒</div>
          <h2 style="font-size:1.25rem;">Suggestions — Restricted Access</h2>
          <p style="color:var(--moss-600);font-size:.9rem;margin-bottom:1.2rem;">This section is for registered students only.</p>
          <input type="text" id="pq-gate-input" class="gate-input" placeholder="Enter your student id to get access">
          <button id="pq-gate-submit" class="btn-primary" style="width:100%;padding:.8rem;">Check Access</button>
          <div id="pq-gate-status" class="hidden" style="margin-top:1.2rem;"></div>
          <p style="margin-top:1.3rem;font-size:.85rem;color:var(--moss-600);">Not registered yet? <a href="register.html" style="color:var(--leaf-500);font-weight:700;">Register here</a></p>
        </div>
      </div>
    </div>

    <div id="pq-content" class="hidden">
      <div class="filters-row">
        <input type="text" id="pq-faculty" placeholder="Faculty Name">
        <input type="text" id="pq-course" placeholder="Course Code">
        <select id="pq-exam">
          <option value="">All Exam Types</option>
          <option value="Class Test">Class Test</option>
          <option value="Midterm">Midterm</option>
          <option value="Final">Final</option>
        </select>
        <button id="pq-search-btn" class="btn-primary">Search</button>
      </div>

      <div id="pq-list" class="card-grid">
        <p style="color:var(--moss-600);font-family:var(--font-mono);font-size:.85rem;">Loading…</p>
      </div>
    </div>
  </div>
</section>

<footer>
  <div class="container">
    <div class="footer-bottom">© AgriStudent BD — All Rights Reserved.</div>
  </div>
</footer>

<script type="module" src="js/resources.js"></script>
<script src="js/main.js"></script>
</body>
</html>
